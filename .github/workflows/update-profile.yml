name: Update Profile Card

on:
  schedule:
    - cron: "0 3 * * *"   # varje natt 03:00 UTC
  workflow_dispatch:        # kan även köras manuellt

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_svg.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-card.svg
          git diff --cached --quiet || git commit -m "chore: update profile card [skip ci]"
          git push
